name: release-plz-release

on:
  push:
    branches:
      - main
    # 只在 release 关键元数据变更时触发（release-plz PR 合并或 cargo release 版本提交）
    paths:
      - "CHANGELOG.md"
      - "**/Cargo.toml"
      - "Cargo.lock"
  workflow_dispatch:

permissions: {}

jobs:
  detect-release-origin:
    name: Detect Cargo Release Publish
    runs-on: ubuntu-latest
    if: github.repository_owner == 'YuniqueUnic'
    outputs:
      skip_release_plz: ${{ steps.detect.outputs.skip_release_plz }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Fetch tags
        run: git fetch --force --tags origin

      - name: Detect pre-existing release tag on HEAD
        id: detect
        env:
          HEAD_MESSAGE: ${{ github.event.head_commit.message }}
        run: |
          set -euo pipefail

          head_tags="$(git tag --points-at HEAD || true)"
          skip_release_plz=false

          if grep -Eq '^(schemaui-cli-)?v[0-9]' <<<"$head_tags"; then
            skip_release_plz=true
          fi

          if [[ "${HEAD_MESSAGE:-}" =~ ^chore:\ Release\ .+\ version\  ]]; then
            skip_release_plz=true
          fi

          echo "HEAD commit message: ${HEAD_MESSAGE:-<none>}"
          if [[ -n "$head_tags" ]]; then
            printf 'HEAD release tags:\n%s\n' "$head_tags"
          else
            echo "HEAD release tags: <none>"
          fi
          echo "skip_release_plz=$skip_release_plz" >> "$GITHUB_OUTPUT"

  release-plz-release-skipped:
    name: Skip Duplicate Release Publish
    runs-on: ubuntu-latest
    needs: detect-release-origin
    if: github.repository_owner == 'YuniqueUnic' && needs.detect-release-origin.outputs.skip_release_plz == 'true'
    steps:
      - name: Explain skip
        run: |
          echo "Detected an existing cargo release commit/tag on HEAD."
          echo "Skipping release-plz release to avoid duplicate crate publish and GitHub release creation."

  release-plz-release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: detect-release-origin
    if: github.repository_owner == 'YuniqueUnic' && needs.detect-release-origin.outputs.skip_release_plz != 'true'
    permissions:
      pull-requests: write
      contents: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: web/ui/pnpm-lock.yaml

      - name: Setup Python 3
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Build web UI bundle
        working-directory: web/ui
        run: pnpm install --frozen-lockfile && pnpm run build:embedded

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Generate GitHub token
        uses: actions/create-github-app-token@v3
        id: generate-token
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          permission-contents: write
          permission-pull-requests: read

      - name: Run release-plz release
        id: release_step
        uses: release-plz/action@v0.5
        with:
          command: release
        env:
          GITHUB_TOKEN: ${{ steps.generate-token.outputs.token }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Sync README versions
        id: sync_readme
        if: ${{ steps.release_step.outputs.releases_created == 'true' }}
        env:
          RELEASES_JSON: ${{ steps.release_step.outputs.releases }}
          PUSH_TOKEN: ${{ steps.generate-token.outputs.token }}
        run: |
          set -euo pipefail

          if [[ -z "$RELEASES_JSON" || "$RELEASES_JSON" == "[]" ]]; then
            echo "Release output is empty; skipping README sync."
            exit 0
          fi

          SCHEMAUI_VERSION="$(echo "$RELEASES_JSON" | jq -r '.[] | select(.package_name == "schemaui") | .version' | head -n1)"

          if [[ -z "$SCHEMAUI_VERSION" || "$SCHEMAUI_VERSION" == "null" ]]; then
            echo "schemaui not part of this release; skipping README sync."
            exit 0
          fi

          ./scripts/update-readme-version.sh "$PWD"

          if git diff --quiet -- README*.md; then
            echo "README files already up to date."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${PUSH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

          git add README*.md
          git commit -m "chore: sync README to $SCHEMAUI_VERSION"
          git push
