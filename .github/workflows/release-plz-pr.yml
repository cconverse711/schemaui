name: release-plz-pr

on:
  push:
    branches:
      - main
    # 忽略只修改了这些文件的 push（通常是 release-plz 的更改）
    paths-ignore:
      - "CHANGELOG.md"
      - "**/Cargo.toml"
      - "Cargo.lock"
      - "README*.md"
  schedule:
    - cron: "0 0 * * MON"

jobs:
  release-plz-pr:
    name: Create Release PR
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: write
    concurrency:
      group: release-plz-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_PLZ_PAT }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Run release-plz PR
        uses: release-plz/action@v0.5
        with:
          command: release-pr
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PLZ_PAT }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Update README
        run: |
          ./scripts/update-readme.sh

          # If README files didn't change, skip commit/push
          if git diff --quiet -- README*.md; then
            echo "No README changes; skipping commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add README*.md
          git commit -m "Update README.md"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PLZ_PAT }}
