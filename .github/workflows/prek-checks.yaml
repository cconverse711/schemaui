name: Prek checks

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize

jobs:
  prek:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: web/ui/pnpm-lock.yaml

      - name: Build web UI bundle
        working-directory: web/ui
        run: pnpm install --frozen-lockfile && pnpm run build:embedded

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2

      - name: prek
        uses: j178/prek-action@v2

      - name: Verify generated installation docs are committed
        run: |
          python3 scripts/sync-install-docs.py --check
          git diff -- README.md README.ZH.md docs/en/cli_usage.md
          git diff --exit-code -- README.md README.ZH.md docs/en/cli_usage.md

      - name: Verify generated README shortcut docs are committed
        run: |
          git diff -- README.md README.ZH.md
          git diff --exit-code -- README.md README.ZH.md
