name: CD # Continuous Deployment

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      release_tag:
        description: "CLI release tag to sync package manager manifests for"
        required: false
        type: string

env:
  CARGO_INCREMENTAL: 0
  CARGO_NET_GIT_FETCH_WITH_CLI: true
  CARGO_NET_RETRY: 10
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  RUSTFLAGS: -D warnings
  RUSTUP_MAX_RETRIES: 10

permissions: {}

defaults:
  run:
    shell: bash

jobs:
  debug-release:
    name: Debug Release Info
    runs-on: ubuntu-latest
    steps:
      - name: Debug release event
        run: |
          echo "Release event triggered!"
          echo "Release name: ${{ github.event.release.name }}"
          echo "Release tag: ${{ github.event.release.tag_name }}"
          echo "Release published: ${{ github.event.release.published_at }}"
          echo "Repository owner: ${{ github.repository_owner }}"

  upload-assets:
    name: ${{ matrix.target }}
    permissions:
      contents: write # to upload release assets
    if: github.repository_owner == 'YuniqueUnic' && startsWith(github.event.release.name, 'schemaui-cli-v')
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-apple-darwin
            os: macos-14
          - target: aarch64-pc-windows-msvc
            os: windows-2022
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-22.04
          - target: x86_64-pc-windows-msvc
            os: windows-2022
          - target: x86_64-unknown-linux-musl
            os: ubuntu-22.04
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-22.04
          - target: aarch64-unknown-linux-musl
            os: ubuntu-22.04
          - target: aarch64-apple-darwin
            os: macos-14
          - target: x86_64-unknown-freebsd
            os: ubuntu-22.04
    timeout-minutes: 60
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: web/ui/pnpm-lock.yaml

      - name: Build web UI bundle
        working-directory: web/ui
        run: pnpm install --frozen-lockfile && pnpm run build:embedded

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1.16.0

      - uses: taiki-e/setup-cross-toolchain-action@v1.39.2
        with:
          target: ${{ matrix.target }}
        if: startsWith(matrix.os, 'ubuntu') && !contains(matrix.target, '-musl')

      - uses: taiki-e/install-action@v2.75.18
        with:
          tool: cross
        if: contains(matrix.target, '-musl')

      - run: echo "RUSTFLAGS=${RUSTFLAGS} -C target-feature=+crt-static" >> "${GITHUB_ENV}"
        if: endsWith(matrix.target, 'windows-msvc')

      - uses: taiki-e/upload-rust-binary-action@v1.30.2
        with:
          package: schemaui-cli
          bin: schemaui
          features: full
          profile: release
          target: ${{ matrix.target }}
          tar: all
          zip: windows
          token: ${{ secrets.GITHUB_TOKEN }}

  sync-package-manifests:
    name: Sync Package Manifests
    needs: upload-assets
    permissions:
      contents: write
    if: github.repository_owner == 'YuniqueUnic' && startsWith(github.event.release.name, 'schemaui-cli-v')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout default branch
        uses: actions/checkout@v6
        with:
          persist-credentials: false
          ref: ${{ github.event.repository.default_branch }}

      - name: Setup Python 3
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Generate GitHub token
        uses: actions/create-github-app-token@v3
        id: generate-token
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          permission-contents: write

      - name: Resolve GitHub auth token
        id: resolve-token
        env:
          RELEASE_PLZ_PAT: ${{ secrets.RELEASE_PLZ_PAT }}
          APP_TOKEN: ${{ steps.generate-token.outputs.token }}
        run: |
          set -euo pipefail

          if [[ -n "${RELEASE_PLZ_PAT:-}" ]]; then
            echo "token=${RELEASE_PLZ_PAT}" >> "$GITHUB_OUTPUT"
            echo "source=release_plz_pat" >> "$GITHUB_OUTPUT"
          else
            echo "token=${APP_TOKEN}" >> "$GITHUB_OUTPUT"
            echo "source=github_app" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate package manager manifests
        env:
          GITHUB_TOKEN: ${{ steps.resolve-token.outputs.token }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail
          echo "Using auth source: ${{ steps.resolve-token.outputs.source }}"
          python3 scripts/sync-package-manifests.py --tag "$RELEASE_TAG"

      - name: Commit manifest updates
        env:
          PUSH_TOKEN: ${{ steps.resolve-token.outputs.token }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail

          if git diff --quiet -- Formula packaging; then
            echo "Package manager manifests already up to date."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${PUSH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

          git add Formula packaging
          git commit -m "chore: sync package manager manifests for ${RELEASE_TAG}"
          git push origin "${{ github.event.repository.default_branch }}"

  sync-package-manifests-manual:
    name: Sync Package Manifests (Manual)
    permissions:
      contents: write
    if: github.repository_owner == 'YuniqueUnic' && github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag != ''
    runs-on: ubuntu-latest
    steps:
      - name: Checkout default branch
        uses: actions/checkout@v6
        with:
          persist-credentials: false
          ref: ${{ github.event.repository.default_branch }}

      - name: Setup Python 3
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Generate GitHub token
        uses: actions/create-github-app-token@v3
        id: generate-token
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          permission-contents: write

      - name: Resolve GitHub auth token
        id: resolve-token
        env:
          RELEASE_PLZ_PAT: ${{ secrets.RELEASE_PLZ_PAT }}
          APP_TOKEN: ${{ steps.generate-token.outputs.token }}
        run: |
          set -euo pipefail

          if [[ -n "${RELEASE_PLZ_PAT:-}" ]]; then
            echo "token=${RELEASE_PLZ_PAT}" >> "$GITHUB_OUTPUT"
            echo "source=release_plz_pat" >> "$GITHUB_OUTPUT"
          else
            echo "token=${APP_TOKEN}" >> "$GITHUB_OUTPUT"
            echo "source=github_app" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate package manager manifests
        env:
          GITHUB_TOKEN: ${{ steps.resolve-token.outputs.token }}
          RELEASE_TAG: ${{ github.event.inputs.release_tag }}
        run: |
          set -euo pipefail
          echo "Using auth source: ${{ steps.resolve-token.outputs.source }}"
          python3 scripts/sync-package-manifests.py --tag "$RELEASE_TAG"

      - name: Commit manifest updates
        env:
          PUSH_TOKEN: ${{ steps.resolve-token.outputs.token }}
          RELEASE_TAG: ${{ github.event.inputs.release_tag }}
        run: |
          set -euo pipefail

          if git diff --quiet -- Formula packaging; then
            echo "Package manager manifests already up to date."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${PUSH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

          git add Formula packaging
          git commit -m "chore: sync package manager manifests for ${RELEASE_TAG}"
          git push origin "${{ github.event.repository.default_branch }}"
